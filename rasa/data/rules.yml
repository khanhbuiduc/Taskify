# Rules for Taskify assistant (single-turn responses)
version: "3.1"

rules:
- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say default when out of scope
  steps:
  - intent: nlu_fallback
  - action: action_fallback_gemini

- rule: Activate create task form
  steps:
  - intent: create_task
  - action: create_task_form
  - active_loop: create_task_form

- rule: Submit create task form
  condition:
  - active_loop: create_task_form
  steps:
  - action: create_task_form
  - active_loop: null
  - action: action_create_task

- rule: Cancel create task form
  condition:
  - active_loop: create_task_form
  steps:
  - intent: deny
  - action: action_cancel_create_task
  - active_loop: null

- rule: Delete task directly
  steps:
  - intent: delete_task
  - action: action_delete_task

- rule: Confirm delete selection
  steps:
  - intent: confirm_delete_selection
  - action: action_delete_task

- rule: Undo delete task
  steps:
  - intent: undo_delete_task
  - action: action_delete_task

- rule: Filter tasks directly
  steps:
  - intent: filter_tasks
  - action: action_filter_tasks

- rule: Create finance entry directly
  steps:
  - intent: create_finance_entry
  - action: action_create_finance_entry

- rule: List finance entries directly
  steps:
  - intent: list_finance_entries
  - action: action_list_finance_entries

- rule: Search finance entries directly
  steps:
  - intent: search_finance_entries
  - action: action_search_finance_entries

- rule: Update finance entry directly
  steps:
  - intent: update_finance_entry
  - action: action_update_finance_entry

- rule: Delete finance entry directly
  steps:
  - intent: delete_finance_entry
  - action: action_delete_finance_entry

- rule: Summarize finance directly
  steps:
  - intent: summarize_finance
  - action: action_summarize_finance

- rule: Create finance category directly
  steps:
  - intent: create_finance_category
  - action: action_create_finance_category

- rule: List finance categories directly
  steps:
  - intent: list_finance_categories
  - action: action_list_finance_categories

- rule: Update finance category directly
  steps:
  - intent: update_finance_category
  - action: action_update_finance_category

- rule: Delete finance category directly
  steps:
  - intent: delete_finance_category
  - action: action_delete_finance_category

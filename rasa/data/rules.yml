# Rules for Taskify assistant (single-turn responses)
version: "3.1"

rules:
- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say default when out of scope
  steps:
  - intent: nlu_fallback
  - action: utter_default

- rule: Activate create task form
  steps:
  - intent: create_task
  - action: create_task_form
  - active_loop: create_task_form

- rule: Submit create task form
  condition:
  - active_loop: create_task_form
  steps:
  - action: create_task_form
  - active_loop: null
  - action: action_create_task

- rule: Cancel create task form
  condition:
  - active_loop: create_task_form
  steps:
  - intent: deny
  - action: action_cancel_create_task
  - active_loop: null

- rule: Delete task directly
  steps:
  - intent: delete_task
  - action: action_delete_task

- rule: List tasks by date directly
  steps:
  - intent: list_tasks_by_date
  - action: action_list_tasks

# Dữ liệu huấn luyện NLU cho trợ lý Taskify
version: "3.1"

nlu:
  - intent: create_finance_entry
    examples: |
      - thêm chi tiêu [50000](finance_amount) danh mục [ăn uống](finance_category) mô tả [cơm trưa](finance_description)
      - ghi nhận chi phí [120k](finance_amount) cho [cà phê cùng nhóm](finance_description) danh mục [ăn uống](finance_category)
      - hôm nay tôi tiêu [250000](finance_amount) cho [đổ xăng](finance_description) loại [di chuyển](finance_category)
      - thêm giao dịch [1.2tr](finance_amount) danh mục [mua sắm](finance_category) nội dung [mua bàn phím](finance_description)
      - tạo chi phí [85000](finance_amount) ngày [hôm nay](finance_date) cho [ăn tối](finance_description)
      - ghi khoản chi [15000](finance_amount) danh mục [ăn uống](finance_category) nội dung [bữa trưa](finance_description)
      - lưu khoản chi [200000](finance_amount) cho [xe ôm công nghệ](finance_description) vào [di chuyển](finance_category)
      - lưu chi tiêu [300k](finance_amount) [ngày mai](finance_date) danh mục [hóa đơn](finance_category)
      - mình vừa chi [45000](finance_amount) mua [trà sữa](finance_description)
      - thêm khoản chi [700000](finance_amount) cho [tiền điện](finance_description) danh mục [hóa đơn](finance_category)
      - ghi lại [35000](finance_amount) tiền [gửi xe](finance_description) vào [di chuyển](finance_category)
      - tạo khoản tài chính [99000](finance_amount) cho [sách](finance_description) danh mục [học tập](finance_category)

  - intent: list_finance_entries
    examples: |
      - xem chi tiêu gần đây
      - liệt kê tài chính
      - danh sách giao dịch tài chính
      - xem các khoản chi
      - mở danh sách chi tiêu
      - cho tôi xem các khoản chi
      - liệt kê các giao dịch chi tiêu
      - xem chi tiêu [hôm nay](finance_date)
      - liệt kê khoản chi danh mục [ăn uống](finance_category)
      - xem giao dịch [ngày mai](finance_date)
      - cho tôi xem sổ chi tiêu
      - hiển thị các mục tài chính mới nhất

  - intent: search_finance_entries
    examples: |
      - tìm chi tiêu [cà phê](finance_keyword)
      - tìm khoản chi chứa [xe ôm](finance_keyword)
      - tìm khoản chi cho [bữa trưa](finance_keyword)
      - lọc chi tiêu danh mục [ăn uống](finance_category)
      - có khoản chi nào về [đổ xăng](finance_keyword)
      - tìm giao dịch [tiền điện](finance_keyword)
      - tìm khoản tài chính [mua sắm](finance_keyword)
      - xem chi phí liên quan [nhóm](finance_keyword)
      - lọc chi tiêu danh mục [di chuyển](finance_category)
      - tìm khoản tài chính có [bàn phím](finance_keyword)

  - intent: update_finance_entry
    examples: |
      - sửa chi tiêu [cà phê](finance_keyword) thành [60000](finance_amount)
      - cập nhật khoản chi [xe ôm](finance_keyword) danh mục [di chuyển](finance_category)
      - đổi giao dịch [ăn tối](finance_keyword) thành [120000](finance_amount)
      - cập nhật khoản chi [bữa trưa](finance_keyword) thành [20000](finance_amount)
      - sửa khoản tài chính [tiền điện](finance_keyword) mô tả [tiền điện tháng này](finance_description)
      - cập nhật chi phí [trà sữa](finance_keyword) ngày [hôm nay](finance_date)
      - đổi danh mục khoản chi [bàn phím](finance_keyword) sang [mua sắm](finance_category)
      - sửa khoản tài chính [đổ xăng](finance_keyword) thành [300000](finance_amount)

  - intent: delete_finance_entry
    examples: |
      - xóa chi tiêu [cà phê](finance_keyword)
      - xoá khoản chi [xe ôm](finance_keyword)
      - xóa khoản chi [bữa trưa](finance_keyword)
      - bỏ giao dịch [tiền điện](finance_keyword)
      - xóa giao dịch tài chính [trà sữa](finance_keyword)
      - xoá chi phí danh mục [ăn uống](finance_category)
      - xóa khoản tài chính [đổ xăng](finance_keyword)
      - gỡ mục chi tiêu [bàn phím](finance_keyword)

  - intent: summarize_finance
    examples: |
      - tổng kết chi tiêu
      - thống kê tài chính
      - tháng này tôi tiêu bao nhiêu
      - tổng chi hôm nay
      - báo cáo tài chính
      - tóm tắt chi tiêu của tôi
      - tổng hợp chi tiêu
      - tổng kết danh mục [ăn uống](finance_category)
      - thống kê chi tiêu [hôm nay](finance_date)
      - tính tổng khoản chi
      - cho tôi báo cáo chi phí

  - intent: create_finance_category
    examples: |
      - tạo danh mục tài chính [ăn uống](finance_category)
      - thêm danh mục tài chính [di chuyển](finance_category)
      - tạo loại chi tiêu [hóa đơn](finance_category)
      - thêm danh mục chi tiêu [mua sắm](finance_category)
      - thêm danh mục [giải trí](finance_category) cho tài chính

  - intent: list_finance_categories
    examples: |
      - xem danh mục tài chính
      - liệt kê danh mục tài chính
      - danh sách loại chi tiêu
      - xem các danh mục chi tiêu
      - xem các danh mục chi tiêu

  - intent: update_finance_category
    examples: |
      - đổi danh mục [ăn uống](finance_keyword) thành [ẩm thực](finance_category)
      - sửa danh mục [di chuyển](finance_keyword) thành [đi lại](finance_category)
      - cập nhật danh mục tài chính [hóa đơn](finance_keyword) sang [chi phí sinh hoạt](finance_category)
      - đổi tên danh mục [mua sắm](finance_keyword) thành [tiêu dùng](finance_category)

  - intent: delete_finance_category
    examples: |
      - xóa danh mục tài chính [ăn uống](finance_category)
      - xoá danh mục tài chính [di chuyển](finance_category)
      - xóa danh mục chi tiêu [mua sắm](finance_category)
      - bỏ danh mục chi tiêu [hóa đơn](finance_category)

  - regex: finance_amount
    examples: |
      - \d+(?:[.,]\d+)?\s?(?:k|nghìn|ngàn|tr|triệu|m|vnd|đ)?

  - regex: finance_date
    examples: |
      - hôm nay
      - ngày mai
      - ngày kia
      - tuần sau
      - tháng sau
      - \d{1,2}/\d{1,2}(?:/\d{2,4})?
